{% extends 'base.html' %}
{% block content %}
<h2>Dashboard</h2>
<p>Stage 1 scope: master data + CSV import + audit report.</p>
<div class="grid">
  {% for key, value in stats.items() %}
  <article><h3>{{ key.replace('_', ' ').title() }}</h3><p>{{ value }}</p></article>
  {% endfor %}
</div>
<p><a class="btn" href="{{ url_for('seed_data') }}">Initialize/Seed Database</a></p>
{% endblock %}
