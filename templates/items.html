{% extends 'base.html' %}
{% block content %}
<h2>Items</h2>
<form method="post" class="form-grid">
  <input name="sku" placeholder="SKU" required>
  <input name="name" placeholder="Name" required>
  <input name="uom_code" placeholder="UOM code">
  <input name="safety_stock_qty" type="number" step="0.01" placeholder="Safety stock">
  <input name="reorder_point_qty" type="number" step="0.01" placeholder="Reorder point">
  <button type="submit">Add Item</button>
</form>
<table>
  <tr><th>ID</th><th>SKU</th><th>Name</th><th>UOM</th><th>Safety</th><th>Reorder</th></tr>
  {% for row in rows %}
  <tr><td>{{ row.id }}</td><td>{{ row.sku }}</td><td>{{ row.name }}</td><td>{{ row.uom_code }}</td><td>{{ row.safety_stock_qty }}</td><td>{{ row.reorder_point_qty }}</td></tr>
  {% endfor %}
</table>
{% endblock %}
